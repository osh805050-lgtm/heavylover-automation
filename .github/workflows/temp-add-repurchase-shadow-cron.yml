name: "[TEMP] Repurchase Shadow Cron 등록"

on:
  workflow_dispatch: {}

jobs:
  add-cron:
    runs-on: ubuntu-latest
    steps:
      - name: 현재 crontab 확인 후 shadow/compare 항목 추가
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          script: |
            set -e
            echo "=== 현재 crontab ==="
            crontab -l || echo "(crontab 없음)"

            # heavylover-repurchase 디렉토리 확인
            ls -la /root/heavylover-repurchase/repurchase_analysis.py || echo "WARNING: 파일 없음"

            # 기존 shadow/compare cron 항목 모두 제거 (python/venv 구분 없이)
            crontab -l | grep -v "repurchase_analysis.py --shadow" | grep -v "tools/compare_analysis.py" | crontab -

            # venv/bin/python으로 등록 (기존 cron과 동일 패턴)
            VENV=/root/heavylover-repurchase/venv/bin/python
            (crontab -l 2>/dev/null; echo "45 8 * * * cd /root/heavylover-repurchase && $VENV repurchase_analysis.py --shadow >> logs/shadow.log 2>&1") | crontab -
            (crontab -l 2>/dev/null; echo "55 8 * * * cd /root/heavylover-repurchase && $VENV tools/compare_analysis.py >> logs/compare.log 2>&1") | crontab -

            echo "=== 수정 후 crontab ==="
            crontab -l
