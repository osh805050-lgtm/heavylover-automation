name: Meta 광고 일일 리포트

# 매일 KST 08:00 = UTC 전날 23:00 (정각 큐 집중 회피)
# (GitHub Actions cron은 UTC 기준)
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write  # 리포트 파일 커밋용

concurrency:
  group: meta-ads-daily
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Meta Ads report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ vars.META_API_VERSION || 'v21.0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python meta_ads_report.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/meta-ads/reports/ data/meta_ads/daily.csv data/meta_ads/daily_campaign.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 스킵"
          else
            git commit -m "chore(meta-ads): 일일 리포트 + 시계열 누적 자동 생성"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push 충돌 — 재시도 $i/3"
              sleep 5
            done
          fi

      - name: Notify failure on Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="[Meta 광고 워크플로우 실패] GitHub Actions run=${{ github.run_id }}" \
            > /dev/null || true
