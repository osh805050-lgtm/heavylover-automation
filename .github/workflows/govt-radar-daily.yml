name: 정부지원 레이더 일일 실행

# 매일 KST 11:00 = UTC 02:00
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write  # 결과 JSON 커밋용

concurrency:
  group: govt-radar-daily
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run govt radar
        env:
          NAVER_MAIL_USER: ${{ secrets.NAVER_MAIL_USER }}
          NAVER_MAIL_APP_PASSWORD: ${{ secrets.NAVER_MAIL_APP_PASSWORD }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_GOVT: ${{ secrets.TELEGRAM_BOT_TOKEN_GOVT }}
          TELEGRAM_CHAT_ID_GOVT: ${{ secrets.TELEGRAM_CHAT_ID_GOVT }}
          # 이메일 일일 요약 발송
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # 캘린더 (선택 — 미설정 시 자동 스킵)
          GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python govt_radar.py --days-back 2

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/govt_radar/ logs/ || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(govt-radar): 일일 결과 자동 저장"
            git push
          fi

      - name: Notify failure on Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="[govt-radar 실패] GitHub Actions run=${{ github.run_id }}" \
            > /dev/null || true
