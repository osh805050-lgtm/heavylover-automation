name: 정부지원 레이더 일일 실행

# 자동 cron 해제 (2026-05-19): 미국 IP 차단으로 5개 사이트 0건 → 데스크톱 /govt-radar 슬래시 명령으로 전환
# workflow_dispatch만 유지 = 데스크톱 못 켤 때 백업 경로
on:
  workflow_dispatch:

permissions:
  contents: write  # 결과 JSON 커밋용

concurrency:
  group: govt-radar-daily
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 2026-05-18: Playwright 7 사이트 추가로 15→45 증가

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-1.40

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit fallback)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run govt radar
        env:
          NAVER_MAIL_USER: ${{ secrets.NAVER_MAIL_USER }}
          NAVER_MAIL_APP_PASSWORD: ${{ secrets.NAVER_MAIL_APP_PASSWORD }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_GOVT: ${{ secrets.TELEGRAM_BOT_TOKEN_GOVT }}
          TELEGRAM_CHAT_ID_GOVT: ${{ secrets.TELEGRAM_CHAT_ID_GOVT }}
          # 이메일 일일 요약 발송
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # 캘린더 (선택 — 미설정 시 자동 스킵)
          GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python govt_radar.py --days-back 2

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/govt_radar/ logs/ || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(govt-radar): 일일 결과 자동 저장"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push 충돌 — 재시도 $i/3"
              sleep 5
            done
          fi

      - name: Notify failure on Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Codex review 2026-05-10: || true 제거 — secret 누락 시 silent 차단
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN/CHAT_ID secret 누락 — 실패 알림 발송 불가"
            exit 1
          fi
          response=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="[govt-radar 실패] GitHub Actions run=${{ github.run_id }}")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" != "200" ]; then
            echo "::error::Telegram API 응답 비정상 (HTTP $http_code): $response"
            exit 1
          fi
