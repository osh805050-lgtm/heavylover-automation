name: Run Tracking Now (one-shot)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 Vultr에서 송장 등록 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          script: |
            cd /root/heavylover-automation
            python3 -c "from tracking_register import run_from_excel; run_from_excel()" 2>&1
