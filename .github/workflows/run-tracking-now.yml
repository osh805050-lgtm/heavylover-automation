name: Run Tracking Now (임시)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 tracking 직접 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          script: |
            cd /root/heavylover-automation
            echo "=== git SHA ==="
            git log --oneline -2
            echo "=== tracking 직접 실행 ==="
            ./venv/bin/python -c "
import tracking_register
tracking_register.run_from_excel()
" 2>&1
