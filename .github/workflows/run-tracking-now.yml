name: Run Tracking Now (one-shot)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 Vultr에서 송장 등록 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          script: |
            cd /root/heavylover-automation
            echo "=== crontab 확인 ==="
            crontab -l | grep python | head -5
            echo "=== venv 탐색 ==="
            find /root/heavylover-automation -name "python3" -o -name "python" 2>/dev/null | head -5
            ls /root/heavylover-automation/venv/bin/python3 2>/dev/null || echo "venv 없음"
