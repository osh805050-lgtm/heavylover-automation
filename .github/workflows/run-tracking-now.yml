name: Run Tracking Now (one-shot)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 Vultr에서 송장 등록 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_PORT }}
          script: |
            cd /root/heavylover-automation
            /root/heavylover-automation/venv/bin/python3 - <<'EOF'
            import pandas as pd
            from pathlib import Path
            files = list(Path("/tmp/tracking_excel").glob("더다냉동물류*.xls*"))
            if not files:
                print("파일 없음 — rclone 먼저 실행")
            else:
                df = pd.read_excel(files[-1], dtype=str)
                print("컬럼:", list(df.columns))
                print("첫 2행:")
                print(df.head(2).to_string())
            EOF
