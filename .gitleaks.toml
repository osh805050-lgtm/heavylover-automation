# gitleaks 보안 스캔 설정 — 헤비로버 자동화
#
# 원칙: 실제 시크릿(.env + GitHub Secrets)은 git에 안 들어옴.
#       코드 내 _key/_name/_id로 끝나는 변수는 식별자(시트 탭명, 컬럼명 등)이지 시크릿 아님.
#       generic-api-key 룰의 false positive를 allowlist로 차단.

[extend]
useDefault = true

[allowlist]
description = "헤비로버 false positive 차단 — 식별자 변수 + 테스트 더미값"

# 1) 짧은 식별자 문자열 (시트 탭명, DB 컬럼명, 키워드 분류 등)
#    예: monthly_tab_key = "cafe24_monthly"
#        action_type = "purchase"
#        sheet_name = "Meta_Ads_Daily"
regexes = [
    # _name/_id/_tab/_type/_action/_field/_col/_status/_role/_label — 짧은 식별자(최대 20자) + 시크릿 prefix 제외
    # 주의: _key는 제외 — 진짜 API 키 흔히 'api_key', 'access_key' 같은 이름 사용
    '''(_name|_id|_tab|_type|_action|_field|_col|_status|_role|_label)\s*=\s*["'](?!sk-|AKIA|ghp_|gho_|ghs_|xoxb-|xoxp-|AIza)[a-zA-Z0-9가-힣_\- ]{1,20}["']''',
    # 2) .env.example의 빈 값 (예: API_KEY=)
    '''[A-Z_]+\s*=\s*$''',
    # 3) Meta 광고 계정 ID — 공개돼도 무해 (시크릿 토큰 아님)
    '''act_445075134545178''',
]

# 4) 자동 생성 파일 / 산출물은 스캔 제외
paths = [
    '''data/meta_ads/raw/.*\.json''',
    '''data/meta_ads/.*\.csv''',
    '''docs/meta-ads/reports/.*\.md''',
    '''proposals/outputs/.*''',
    '''\.claude/.*\.local\.md''',
]
